services:
  femtollm:
    build: .
    # tini as PID 1 so orphaned subprocesses are reaped. Required by stevedore.
    init: true
    restart: on-failure:5
    volumes:
      - ${STEVEDORE_DATA:-./data}:/data
    environment:
      - FEMTOLLM_CONFIG=/data/config.json
    network_mode: host
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8880/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
