services:
  femtollm:
    build: .
    restart: on-failure:5
    volumes:
      - ${STEVEDORE_DATA:-./data}:/data
    environment:
      - FEMTOLLM_CONFIG=/data/config.json
    network_mode: host
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
